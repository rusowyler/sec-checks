name: "SEC Checks - SAST & Supply Chain Scanner"
description: "Runs security checks using SAST and audit scripts for supply chain attacks"
author: "rusowyler"

branding:
  icon: "shield"
  color: "red"

inputs:
  semgrep-config:
    description: "Semgrep config to use (e.g. auto, p/owasp-top-ten, or a local path)"
    required: false
    default: "auto"
  custom-rules-path:
    description: "Path to custom Semgrep rules directory"
    required: false
    default: ".semgrep/"
  fail-on-severity:
    description: "Minimum severity to fail the build (ERROR, WARNING, INFO)"
    required: false
    default: "ERROR"
  supply-chain-audit:
    description: "Enable package.json supply chain audit"
    required: false
    default: "true"
  artifact-name:
    description: "Name of the uploaded results artifact"
    required: false
    default: "semgrep-results"
  trusted-actions:
    description: "Comma-separated action names allowed to use version tags instead of commit SHAs (e.g. actions/checkout, docker/login-action)"
    required: false
    default: ""
  pr-diff-mode:
    description: "Use 'semgrep ci' (diff-aware) on pull requests and 'semgrep scan' on full runs. Set to 'false' to always use semgrep scan."
    required: false
    default: "true"

outputs:
  findings-count:
    description: "Total number of Semgrep findings"
    value: ${{ steps.count.outputs.findings }}
  blocking-count:
    description: "Number of findings at or above fail-on-severity"
    value: ${{ steps.count.outputs.blocking }}
  supply-chain-findings:
    description: "Number of suspicious lifecycle scripts found"
    value: ${{ steps.supply-chain.outputs.findings }}

runs:
  using: "composite"
  steps:
    - name: Install Semgrep
      shell: bash
      run: pip install semgrep

    - name: Prepare trusted-actions rule override
      if: inputs.trusted-actions != ''
      shell: python3 {0}
      env:
        TRUSTED: ${{ inputs.trusted-actions }}
        CI_SEC_SRC: ${{ github.action_path }}/custom-rules/semgrep/ci-security.yml
      run: |
        import yaml, re, os
        trusted = [p.strip() for p in os.environ['TRUSTED'].split(',') if p.strip()]
        excl = r'uses:\s+(' + '|'.join(re.escape(p) for p in trusted) + r')@'
        with open(os.environ['CI_SEC_SRC']) as f:
            doc = yaml.safe_load(f)
        for r in doc.get('rules', []):
            if r.get('id') == 'github-actions-unpinned-action' and 'pattern-regex' in r:
                r['patterns'] = [{'pattern-regex': r.pop('pattern-regex')}, {'pattern-not-regex': excl}]
        with open('/tmp/ci-security-modified.yml', 'w') as f:
            yaml.dump(doc, f, default_flow_style=False)

    - name: Run Semgrep
      shell: bash
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
        CUSTOM_RULES_PATH: ${{ inputs.custom-rules-path }}
        PR_DIFF_MODE: ${{ inputs.pr-diff-mode }}
      run: |
        CONFIGS="--config=$SEMGREP_CONFIG"
        if [ -d "$CUSTOM_RULES_PATH" ]; then
          CONFIGS="$CONFIGS --config=$CUSTOM_RULES_PATH"
        fi
        CUSTOM_RULES="$GITHUB_ACTION_PATH/custom-rules/semgrep"
        if [ -d "$CUSTOM_RULES" ]; then
          if [ -f "/tmp/ci-security-modified.yml" ]; then
            for rule_file in "$CUSTOM_RULES"/*.yml; do
              if [ "$(basename "$rule_file")" = "ci-security.yml" ]; then
                CONFIGS="$CONFIGS --config=/tmp/ci-security-modified.yml"
              else
                CONFIGS="$CONFIGS --config=$rule_file"
              fi
            done
          else
            CONFIGS="$CONFIGS --config=$CUSTOM_RULES"
          fi
        fi
        if [ "$PR_DIFF_MODE" = "true" ] && [ -n "$GITHUB_BASE_REF" ]; then
          semgrep ci $CONFIGS --json --output=semgrep-results.json
        else
          semgrep scan $CONFIGS --json --output=semgrep-results.json
        fi
      continue-on-error: true

    - name: Generate Semgrep Summary
      id: semgrep-summary
      shell: python3 {0}
      run: |
        import json, os

        with open("semgrep-results.json") as f:
            data = json.load(f)

        results = data.get("results", [])
        errors  = data.get("errors", [])
        summary = os.environ.get("GITHUB_STEP_SUMMARY")

        counts = {"ERROR": 0, "WARNING": 0, "INFO": 0}

        with open(summary, "a") as out:
            out.write("## Semgrep SAST Results\n\n")

            if not results:
                out.write("✅ **No findings — clean scan!**\n")
            else:
                for r in results:
                    sev = r.get("extra", {}).get("severity", "INFO").upper()
                    counts[sev] = counts.get(sev, 0) + 1

                out.write("| 🔴 Error | 🟡 Warning | 🔵 Info | Total |\n")
                out.write("|---------|-----------|--------|-------|\n")
                out.write(f"| {counts['ERROR']} | {counts['WARNING']} | {counts['INFO']} | {len(results)} |\n\n")

                out.write("### Findings\n\n")
                out.write("| Severity | Rule | File | Line | Message |\n")
                out.write("|----------|------|------|------|---------|\n")

                icons = {"ERROR": "🔴", "WARNING": "🟡", "INFO": "🔵"}
                for r in sorted(results, key=lambda x: x.get("extra", {}).get("severity", "INFO")):
                    sev  = r.get("extra", {}).get("severity", "INFO").upper()
                    rule = r.get("check_id", "unknown").split(".")[-1]
                    path = r.get("path", "")
                    line = r.get("start", {}).get("line", "?")
                    msg  = r.get("extra", {}).get("message", "").replace("|", "\\|").strip()
                    msg  = msg[:120] + "…" if len(msg) > 120 else msg
                    icon = icons.get(sev, "🔵")
                    out.write(f"| {icon} {sev} | `{rule}` | `{path}` | {line} | {msg} |\n")

            if errors:
                out.write(f"\n\n> ⚠️ **{len(errors)} scan error(s)** encountered during analysis.\n")

        gho = os.environ.get("GITHUB_OUTPUT", "")
        if gho:
            with open(gho, "a") as out:
                out.write(f"sast_errors={counts.get('ERROR', 0)}\n")
                out.write(f"sast_warnings={counts.get('WARNING', 0)}\n")
                out.write(f"sast_info={counts.get('INFO', 0)}\n")
                out.write(f"sast_total={len(results)}\n")

    - name: Count findings
      id: count
      shell: python3 {0}
      env:
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: |
        import json, os

        severity_order = {"ERROR": 3, "WARNING": 2, "INFO": 1}
        fail_on = os.environ["FAIL_ON_SEVERITY"].upper()
        fail_level = severity_order.get(fail_on, 3)

        with open("semgrep-results.json") as f:
            data = json.load(f)

        results = data.get("results", [])
        blocking = [
            r for r in results
            if severity_order.get(r.get("extra", {}).get("severity", "INFO").upper(), 1) >= fail_level
        ]

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"findings={len(results)}\n")
            out.write(f"blocking={len(blocking)}\n")

    - name: Fail if blocking findings exist
      shell: bash
      env:
        BLOCKING: ${{ steps.count.outputs.blocking }}
        FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: |
        if [ "$BLOCKING" -gt "0" ]; then
          echo "❌ $BLOCKING blocking finding(s) at severity '$FAIL_ON_SEVERITY' or above."
          exit 1
        fi

    - name: Audit package.json lifecycle scripts
      id: supply-chain
      if: inputs.supply-chain-audit == 'true'
      shell: python3 {0}
      run: |
        import json, sys, re, os
        from pathlib import Path

        DANGEROUS_HOOKS = {"preinstall", "postinstall", "prepare", "prepack", "postpack"}
        DANGEROUS_PATTERNS = [
            (r'curl\s+.*https?://',    "curl downloading remote content"),
            (r'wget\s+.*https?://',    "wget downloading remote content"),
            (r'\|\s*(sh|bash|zsh)',    "piping to shell"),
            (r'chmod\s+\+x',          "making file executable"),
            (r'/tmp/',                 "writing to /tmp"),
            (r'eval\s*\(',            "eval() execution"),
            (r'base64\s+.*-d',        "base64 decode (possible obfuscation)"),
            (r'python[23]?\s+-c',     "inline Python execution"),
            (r'node\s+-e',            "inline Node execution"),
            (r'exec\s*\(',            "exec() call"),
        ]

        findings = []
        summary = os.environ.get("GITHUB_STEP_SUMMARY")

        for pkg_file in Path(".").rglob("package.json"):
            if "node_modules" in pkg_file.parts:
                continue
            try:
                data = json.loads(pkg_file.read_text())
            except json.JSONDecodeError:
                continue

            scripts = data.get("scripts", {})
            for hook, cmd in scripts.items():
                if hook in DANGEROUS_HOOKS:
                    for pattern, reason in DANGEROUS_PATTERNS:
                        if re.search(pattern, cmd, re.IGNORECASE):
                            findings.append({
                                "file": str(pkg_file),
                                "hook": hook,
                                "reason": reason,
                                "cmd": cmd[:120],
                            })

        if summary:
            with open(summary, "a") as out:
                out.write("## Supply Chain Audit\n\n")
                if not findings:
                    out.write("✅ **No suspicious lifecycle scripts detected.**\n")
                else:
                    out.write(f"🚨 **{len(findings)} suspicious lifecycle script(s) found!**\n\n")
                    out.write("| File | Hook | Reason | Command |\n")
                    out.write("|------|------|--------|---------|\n")
                    for f in findings:
                        cmd = f['cmd'].replace('|', '\\|')
                        out.write(f"| `{f['file']}` | `{f['hook']}` | {f['reason']} | `{cmd}` |\n")

        with open(os.environ["GITHUB_OUTPUT"], "a") as out:
            out.write(f"findings={len(findings)}\n")

        if findings:
            print(f"🚨 {len(findings)} suspicious lifecycle script(s) detected:")
            for f in findings:
                print(f"  [{f['file']}] {f['hook']}: {f['reason']}")
                print(f"    → {f['cmd']}")
            sys.exit(1)
        else:
            print("✅ No suspicious lifecycle scripts found.")

    - name: Generate Results Summary
      if: always()
      shell: python3 {0}
      env:
        SAST_ERRORS:   ${{ steps.semgrep-summary.outputs.sast_errors }}
        SAST_WARNINGS: ${{ steps.semgrep-summary.outputs.sast_warnings }}
        SAST_INFO:     ${{ steps.semgrep-summary.outputs.sast_info }}
        SAST_TOTAL:    ${{ steps.semgrep-summary.outputs.sast_total }}
        SC_FINDINGS:   ${{ steps.supply-chain.outputs.findings }}
      run: |
        import os

        sast_e = int(os.environ.get("SAST_ERRORS")   or 0)
        sast_w = int(os.environ.get("SAST_WARNINGS") or 0)
        sast_i = int(os.environ.get("SAST_INFO")     or 0)
        sast_t = int(os.environ.get("SAST_TOTAL")    or 0)
        sc     = int(os.environ.get("SC_FINDINGS")   or 0)

        tot_e = sast_e + sc
        tot_w = sast_w
        tot_i = sast_i
        tot_t = sast_t + sc

        table  = "## Results\n\n"
        table += "| | 🔴 Error | 🟡 Warning | 🔵 Info | Total |\n"
        table += "|---|:---:|:---:|:---:|:---:|\n"
        table += f"| Semgrep SAST Results | {sast_e} | {sast_w} | {sast_i} | {sast_t} |\n"
        table += f"| Supply Chain Audit | {sc} | 0 | 0 | {sc} |\n"
        table += f"| **Total** | **{tot_e}** | **{tot_w}** | **{tot_i}** | **{tot_t}** |\n"
        table += "\n---\n\n"

        summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
        existing = ""
        try:
            with open(summary_path) as f:
                existing = f.read()
        except (FileNotFoundError, TypeError):
            pass

        with open(summary_path, "w") as f:
            f.write(table + existing)

    - name: Upload results artifact
      if: always()
      id: artifact-upload
      continue-on-error: true
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: semgrep-results.json

    - name: Warn on artifact upload failure
      if: always() && steps.artifact-upload.outcome == 'failure'
      shell: bash
      run: |
        echo "⚠️ Artifact upload skipped — storage quota may be full. Results were not saved." \
          >> "$GITHUB_STEP_SUMMARY"
